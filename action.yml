name: tik-test
description: Automated TikTok-style video reviews for your pull requests — Claude plans, Playwright runs, FFmpeg + Remotion compose, posted as a PR comment with optional formal review.
author: Marcus Hyett
branding:
  icon: play-circle
  color: purple

inputs:
  claude-code-oauth-token:
    description: |
      OAuth token for the Claude Code Max subscription. Generate locally with `claude setup-token`,
      then paste into a repository secret. Required unless `anthropic-api-key` is provided.
    required: false
    default: ''
  anthropic-api-key:
    description: Pay-per-use Anthropic API key. Alternative to `claude-code-oauth-token`.
    required: false
    default: ''
  openai-api-key:
    description: Optional. Enables OpenAI TTS voice-over. Without it the video is silent on Linux runners.
    required: false
    default: ''
  pr-number:
    description: PR number to review. Auto-detected from `pull_request`, `deployment_status`, or `workflow_dispatch` events when omitted.
    required: false
    default: ''
  preview-url:
    description: Override the target URL. Auto-detected from `deployment_status` events when omitted; otherwise read from the consumer repo's `claude.md`.
    required: false
    default: ''
  vercel-bypass-secret:
    description: Vercel automation bypass secret for protected previews. Optional.
    required: false
    default: ''
  review-mode:
    description: 'How to leave a formal PR review: `none` · `approve-on-pass` · `request-changes-on-fail` · `always`.'
    required: false
    default: request-changes-on-fail
  require-pass:
    description: If `true`, the job exits non-zero when any test step fails (turns the check red).
    required: false
    default: 'true'
  quick:
    description: If `true`, produce a draft 540×960 render in ~2 min. Set `false` for full-res.
    required: false
    default: 'true'
  quick-and-dirty:
    description: |
      Faster, lower-quality preset. Drops the render to 0.5× of native (540×960)
      and caps body scenes at 6 so the narration call is shorter. Use when speed
      matters more than fidelity. Default: false.
    required: false
    default: 'false'
  no-video:
    description: |
      Skip video render + upload entirely. Same plan generation, same agent run,
      same LLM-synthesised checklist — just no MP4. The PR comment posted in
      this mode is text-only (checklist + summary, no `tik-test-video:v1`
      marker, so the reviewer web app does not pick it up as a feed entry).
      Cuts CI time roughly 5×; pairs well with `run-on-every-push: true` for
      cheap per-commit feedback. Default: false.
    required: false
    default: 'false'
  strict-config:
    description: |
      Refuse silent fallback to CLAUDE.md / bare README when no tiktest.md
      is present. Recommended for production setups so a missing or
      mis-located tiktest.md fails fast rather than silently planning
      against the wrong file. Default: false.
    required: false
    default: 'false'
  skip-no-ui:
    description: |
      When the PR diff contains no UI surface (no `app/`, `src/`,
      `pages/`, `components/`, or `.html`/`.tsx`/`.css`/etc. files),
      skip the review and post a "no UI changed" comment. Stops
      workflow-only / docs-only PRs from producing a fabricated red
      review. Default: false.
    required: false
    default: 'false'
  run-on-every-push:
    description: |
      When false (default), tik-test only runs on the initial `opened` /
      `reopened` PR event and on `workflow_dispatch`. When true, it ALSO
      runs on every commit pushed to the PR branch (the `synchronize`
      event). Each re-run uses Claude credits, so leave off unless you
      want to re-review on every push.
    required: false
    default: 'false'
  github-token:
    description: 'GITHUB_TOKEN with `pull-requests: write` permission. Defaults to the workflow token.'
    required: false
    default: ${{ github.token }}
  working-directory:
    description: Subdirectory of the consumer repo containing `claude.md`. Defaults to the workspace root. Useful for monorepos.
    required: false
    default: ''
  # ── Claude CLI timeouts (seconds) ─────────────────────────────────────
  # These are the inputs you'll most often tune. See `tik-test config` for
  # every knob and the README's Advanced section for risks of changing.
  plan-timeout:
    description: 'Seconds before plan-generation `claude` call is killed. Default 240 (4 min). Bump for huge diffs.'
    required: false
    default: '240'
  agent-timeout:
    description: 'Seconds before EACH per-goal browser-driving `claude` call is killed. Default 600 (10 min). Bump for slow page loads.'
    required: false
    default: '600'
  narration-timeout:
    description: 'Seconds before narration-generation `claude` call is killed. Default 540 (9 min). Bump for long runs (12+ tool moments).'
    required: false
    default: '540'
  feature-finder-timeout:
    description: 'Seconds before fallback feature-finder `claude` call is killed (only fires on a 404 startUrl). Default 60.'
    required: false
    default: '60'

  # ── Plan generation ───────────────────────────────────────────────────
  max-goals:
    description: 'Hard cap on goals the planner produces. Default 3. Above ~5 risks pushing the agent over the 25-min job budget.'
    required: false
    default: '3'

  # ── Body-narration density ────────────────────────────────────────────
  min-chunk-seconds:
    description: 'Minimum body chunk length — shorter consecutive moments coalesce. Default 3.5. Lower = more scenes (risk: narration timeout); higher = sluggish pacing.'
    required: false
    default: '3.5'
  max-body-scenes:
    description: 'Hard ceiling on body scenes after coalescing. Default 12. Above ~14 risks narration timeout (also bump narration-timeout).'
    required: false
    default: '12'

  # ── Outro checklist sizing ────────────────────────────────────────────
  checklist-min-items:
    description: 'Minimum items the LLM must produce before the call is treated as failed. Default 4.'
    required: false
    default: '4'
  checklist-max-items:
    description: 'Maximum checklist items rendered on the outro card. Default 10. Above ~12 overflows the safe band on mobile.'
    required: false
    default: '10'

  # ── Intro / outro durations (seconds) ─────────────────────────────────
  intro-seconds:
    description: 'Title-card window. Default 4.5.'
    required: false
    default: '4.5'
  outro-seconds:
    description: 'Outro narration window (before the post-voice hold). Default 4.0.'
    required: false
    default: '4.0'
  outro-hold-seconds:
    description: 'Extra time the outro Sequence holds AFTER the voice ends so the checklist stays readable. Default 3.5.'
    required: false
    default: '3.5'

runs:
  using: composite
  steps:
    # Cheap gate so we don't burn 2-3 minutes of Node + ffmpeg + Playwright
    # install only to skip at the end. Sets `skip=true` for PR `synchronize`
    # events when run-on-every-push is off; every subsequent step gates on it.
    - name: Skip gate (run-on-every-push)
      id: gate
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        EVENT_ACTION: ${{ github.event.action }}
        RUN_ON_PUSH: ${{ inputs.run-on-every-push }}
      run: |
        if [[ "$EVENT_NAME" == "pull_request" && "$EVENT_ACTION" == "synchronize" && "$RUN_ON_PUSH" != "true" ]]; then
          echo "::notice::Skipping tik-test — pull_request synchronize event with run-on-every-push=false. Set run-on-every-push: true to re-review every commit."
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Node 22
      if: steps.gate.outputs.skip != 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install ffmpeg and Playwright Chromium
      if: steps.gate.outputs.skip != 'true'
      shell: bash
      run: |
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-dejavu
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          brew install ffmpeg >/dev/null || true
        else
          echo "::error::Unsupported runner: $RUNNER_OS. tik-test runs on Linux and macOS."
          exit 1
        fi
        npx --yes playwright@1 install chromium --with-deps

    - name: Validate auth inputs
      if: steps.gate.outputs.skip != 'true'
      shell: bash
      env:
        CLAUDE_TOKEN: ${{ inputs.claude-code-oauth-token }}
        ANTHROPIC_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        if [[ -z "$CLAUDE_TOKEN" && -z "$ANTHROPIC_KEY" ]]; then
          echo "::error::Provide either claude-code-oauth-token (recommended — uses your Claude Max subscription) or anthropic-api-key."
          exit 1
        fi

    - name: Authenticate Claude Code (Max OAuth)
      if: ${{ steps.gate.outputs.skip != 'true' && inputs.claude-code-oauth-token != '' }}
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.claude-code-oauth-token }}

    - name: Authenticate Claude Code (API key)
      if: ${{ steps.gate.outputs.skip != 'true' && inputs.claude-code-oauth-token == '' && inputs.anthropic-api-key != '' }}
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key }}

    # claude-code-action@v1 installs the CLI inside its own action_path, which
    # is not on PATH for subsequent steps. tik-test's narrator spawns `claude`
    # directly, so we install it globally so it's visible to subprocesses.
    - name: Install Claude Code CLI for narrator subprocess
      if: steps.gate.outputs.skip != 'true'
      shell: bash
      run: npm install -g @anthropic-ai/claude-code

    - name: Build tik-test
      if: steps.gate.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        if [[ ! -f dist/cli.js ]]; then
          npm ci --omit=dev || npm install
          npm run build
        fi

    - name: Resolve PR number
      if: steps.gate.outputs.skip != 'true'
      id: resolve-pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        EVENT_NAME: ${{ github.event_name }}
        INPUT_PR: ${{ inputs.pr-number }}
        EVENT_PR: ${{ github.event.pull_request.number }}
        DEPLOY_SHA: ${{ github.event.deployment.sha }}
      run: |
        PR_NUMBER="$INPUT_PR"
        if [[ -z "$PR_NUMBER" ]]; then PR_NUMBER="$EVENT_PR"; fi
        if [[ -z "$PR_NUMBER" && "$EVENT_NAME" == "deployment_status" && -n "$DEPLOY_SHA" ]]; then
          PR_NUMBER=$(gh pr list --search "$DEPLOY_SHA" --state open --json number --jq '.[0].number' || true)
        fi
        if [[ -z "$PR_NUMBER" ]]; then
          echo "::error::Could not determine PR number. Pass it explicitly via the pr-number input."
          exit 1
        fi
        echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

    - name: Resolve preview URL
      if: steps.gate.outputs.skip != 'true'
      id: resolve-url
      shell: bash
      env:
        INPUT_URL: ${{ inputs.preview-url }}
        EVENT_NAME: ${{ github.event_name }}
        DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
      run: |
        URL="$INPUT_URL"
        if [[ -z "$URL" && "$EVENT_NAME" == "deployment_status" ]]; then URL="$DEPLOY_URL"; fi
        echo "url=$URL" >> "$GITHUB_OUTPUT"

    - name: Run tik-test
      if: steps.gate.outputs.skip != 'true'
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        VERCEL_AUTOMATION_BYPASS_SECRET: ${{ inputs.vercel-bypass-secret }}
        GH_TOKEN: ${{ inputs.github-token }}
        # The narrator spawns `claude -p ...` for the story generation; pass the
        # auth env vars through so it doesn't get an unauthenticated 401.
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        PR_NUMBER: ${{ steps.resolve-pr.outputs.number }}
        PREVIEW_URL: ${{ steps.resolve-url.outputs.url }}
        REVIEW_MODE: ${{ inputs.review-mode }}
        REQUIRE_PASS: ${{ inputs.require-pass }}
        QUICK: ${{ inputs.quick }}
        NO_VIDEO: ${{ inputs.no-video }}
        STRICT_CONFIG: ${{ inputs.strict-config }}
        SKIP_NO_UI: ${{ inputs.skip-no-ui }}
        ASSET_REPO: ${{ github.repository }}
        ACTION_PATH: ${{ github.action_path }}
        WORKING_DIR: ${{ inputs.working-directory }}
        # Convert seconds-from-input → milliseconds-for-Node so each Claude
        # CLI subprocess inherits the right timeout. See src/timeouts.ts
        # for the full knob table; every knob there has a matching input
        # above and an env-var below — keep them in sync.
        TIK_PLAN_TIMEOUT_MS: ${{ inputs.plan-timeout && format('{0}000', inputs.plan-timeout) || '' }}
        TIK_AGENT_TIMEOUT_MS: ${{ inputs.agent-timeout && format('{0}000', inputs.agent-timeout) || '' }}
        TIK_NARRATION_TIMEOUT_MS: ${{ inputs.narration-timeout && format('{0}000', inputs.narration-timeout) || '' }}
        TIK_FEATURE_FINDER_TIMEOUT_MS: ${{ inputs.feature-finder-timeout && format('{0}000', inputs.feature-finder-timeout) || '' }}
        # Non-timeout knobs pass through as-is (already in their target unit).
        TIK_MAX_GOALS: ${{ inputs.max-goals }}
        TIK_MIN_CHUNK_S: ${{ inputs.min-chunk-seconds }}
        # quick-and-dirty preset overrides max-body-scenes (6) and forces the
        # render scale down to 0.5×. Otherwise the user's explicit input wins.
        TIK_MAX_BODY_SCENES: ${{ inputs.quick-and-dirty == 'true' && '6' || inputs.max-body-scenes }}
        TIK_RENDER_SCALE: ${{ inputs.quick-and-dirty == 'true' && '0.5' || '' }}
        TIK_CHECKLIST_MIN_ITEMS: ${{ inputs.checklist-min-items }}
        TIK_CHECKLIST_MAX_ITEMS: ${{ inputs.checklist-max-items }}
        TIK_INTRO_TARGET_S: ${{ inputs.intro-seconds }}
        TIK_OUTRO_TARGET_S: ${{ inputs.outro-seconds }}
        TIK_OUTRO_HOLD_S: ${{ inputs.outro-hold-seconds }}
      run: |
        ARGS=( pr "$PR_NUMBER" --skip-clone --asset-repo "$ASSET_REPO" --review "$REVIEW_MODE" )
        [[ "$REQUIRE_PASS" == "true" ]] && ARGS+=( --require-pass )
        [[ "$QUICK" == "true" ]] && ARGS+=( --quick )
        [[ "$NO_VIDEO" == "true" ]] && ARGS+=( --no-video )
        [[ "$STRICT_CONFIG" == "true" ]] && ARGS+=( --strict-config )
        [[ "$SKIP_NO_UI" == "true" ]] && ARGS+=( --skip-no-ui )
        [[ -n "$PREVIEW_URL" ]] && ARGS+=( --url "$PREVIEW_URL" )
        if [[ -n "$WORKING_DIR" ]]; then cd "$WORKING_DIR"; fi
        node "$ACTION_PATH/dist/cli.js" "${ARGS[@]}"
