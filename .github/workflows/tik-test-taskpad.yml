#
# tik-test self-review — TASKPAD demo.
#
# Runs on PRs that touch the bundled Taskpad demo at examples/todo-app/.
# Spins up the demo's local server (`node server.js` per its tiktest.md
# `start:` directive) inside the runner, then drives it with the agent.
#
# Sister workflow: tik-test-webapp.yml runs on PRs that touch web/ and
# tests the deployed Vercel reviewer app via the signed bypass URL.
#
# This file is also a working consumer-facing example — copy it into your
# own repo, change `uses: ./` to `uses: marcushyett/tik-test@v1`, and you
# get the same behaviour.
#
# The only secret you need is CLAUDE_CODE_OAUTH_TOKEN. Generate it locally
# with `claude setup-token`, then add it under Settings → Secrets.
#
name: tik-test review (taskpad)

on:
  pull_request:
    paths:
      - examples/todo-app/**
      - .github/workflows/tik-test-taskpad.yml
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true

permissions:
  contents: write           # release-create uploads the video as a release asset
  pull-requests: write
  id-token: write           # required by anthropics/claude-code-action for OIDC

jobs:
  review:
    # Gate: only the maintainer can trigger this. Stops anyone from opening
    # PRs against this repo and burning through the CLAUDE_CODE_OAUTH_TOKEN
    # subscription budget. Also skips fork PRs (secrets aren't available
    # there anyway). Update OWNERS below to add collaborators.
    if: |
      contains(fromJSON(vars.TIKTEST_OWNERS || '["marcushyett"]'), github.actor) &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          pr-number: ${{ github.event.inputs.pr_number }}
          # The bundled Taskpad lives in examples/todo-app/, not at the repo
          # root, and has its own claude.md / index.html that we want the CLI
          # to discover.
          working-directory: examples/todo-app
          # This repo has Vercel connected for the unrelated `web/` app, so PR
          # comments include a vercel.app preview URL the CLI would otherwise
          # auto-detect. Pin the target to the bundled Taskpad demo instead.
          preview-url: http://localhost:4173
          # Taskpad demo PRs are noisy; we just want the agent to confirm the
          # demo still works, fast. Sister webapp workflow keeps full quality.
          quick-and-dirty: true
