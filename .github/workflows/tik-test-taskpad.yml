#
# tik-test self-review — TASKPAD demo.
#
# Runs on PRs that touch the bundled Taskpad demo at examples/todo-app/.
# Spins up the demo's local server (`node server.js` per its tiktest.md
# `start:` directive) inside the runner, then drives it with the agent.
#
# Sister workflow: tik-test-webapp.yml runs on PRs that touch web/ and
# tests the deployed Vercel reviewer app via the signed bypass URL.
#
# This file is also a working consumer-facing example — copy it into your
# own repo, change `uses: ./` to `uses: marcushyett/tik-test@v1`, and you
# get the same behaviour.
#
# The only secret you need is CLAUDE_CODE_OAUTH_TOKEN. Generate it locally
# with `claude setup-token`, then add it under Settings → Secrets.
#
name: tik-test review (taskpad)

on:
  pull_request:
    paths:
      - examples/todo-app/**
      - .github/workflows/tik-test-taskpad.yml
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true

permissions:
  contents: write           # release-create uploads the video as a release asset
  pull-requests: write
  id-token: write           # required by anthropics/claude-code-action for OIDC

jobs:
  review:
    # Gate: only the maintainer can trigger this. Stops anyone from opening
    # PRs against this repo and burning through the CLAUDE_CODE_OAUTH_TOKEN
    # subscription budget. Also skips fork PRs (secrets aren't available
    # there anyway). Update OWNERS below to add collaborators.
    if: |
      contains(fromJSON(vars.TIKTEST_OWNERS || '["marcushyett"]'), github.actor) &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    # 45 min headroom for slow first-time runs (Playwright Chromium pull,
    # Remotion Chrome Headless Shell pull) on cold runners. Tighten if
    # your typical run finishes in <15 min and you'd rather fail fast.
    timeout-minutes: 45
    steps:
      # Two-checkout pattern (self-test only).
      # ──────────────────────────────────────
      # `tooling/`     = main's HEAD — latest action.yml + src/ +
      #                  Remotion compositor (pan-zoom, voice, click-
      #                  before-type, etc.).
      # `pr-content/`  = the PR's HEAD — the index.html we're reviewing.
      #
      # Without the split, `uses: ./` runs whatever action source
      # happens to be on the PR branch. PRs forked before recent video
      # features landed render with stale tooling. Consumer templates
      # don't need this split because `uses: marcushyett/tik-test@v1`
      # pins the action independently of the user's checkout.
      - uses: actions/checkout@v4
        with:
          path: tooling

      - uses: actions/checkout@v4
        with:
          path: pr-content
          ref: ${{ github.event.pull_request.head.sha || (github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/head', github.event.inputs.pr_number)) || '' }}

      - uses: ./tooling
        with:
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          pr-number: ${{ github.event.inputs.pr_number }}
          # tiktest.md, claude.md, and index.html all come from the PR
          # checkout — that's what the running browser will see.
          working-directory: pr-content/examples/todo-app
          # This repo has Vercel connected for the unrelated `web/` app, so PR
          # comments include a vercel.app preview URL the CLI would otherwise
          # auto-detect. Pin the target to the bundled Taskpad demo instead.
          preview-url: http://localhost:4173
          # Taskpad demo PRs render full video so editor / agent / Remotion
          # changes (pan-zoom, captions, narration) can be VISUALLY reviewed
          # against the bundled demo per CLAUDE.md's test-strategy section.
          # Self-review of editor changes against the webapp doesn't work —
          # the agent reviewing the change *is* the agent whose video output
          # the change affects. The taskpad video is the manual eyeball
          # check for those.
          quick-and-dirty: true
          # Bumped from default 540s — generating narration for the bundled
          # taskpad demo with full video on slow Claude responses regularly
          # hits the 9min ceiling. 15min is comfortably above the observed
          # p95 (~6min). Doesn't slow the happy path; only matters if the
          # API is unusually slow that run.
          narration-timeout: 900
