#
# tik-test self-review workflow.
#
# On every PR to this repo, run tik-test against the bundled Taskpad demo
# (examples/todo-app, served via the `start:` directive in claude.md) and
# post a video review back to the PR.
#
# This file is also a working consumer-facing example — copy it into your
# own repo, change `uses: ./` to `uses: marcushyett/tik-test@v1`, and you
# get the same behaviour.
#
# The only secret you need is CLAUDE_CODE_OAUTH_TOKEN. Generate it locally
# with `claude setup-token`, then add it under Settings → Secrets.
#
name: tik-test review

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true

permissions:
  contents: read
  pull-requests: write
  id-token: write           # required by anthropics/claude-code-action for OIDC

jobs:
  review:
    # Skip fork PRs — secrets aren't available, so the action would fail.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          pr-number: ${{ github.event.inputs.pr_number }}
