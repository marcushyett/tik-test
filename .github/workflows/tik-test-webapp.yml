#
# tik-test self-review — REVIEWER WEB APP (web/).
#
# Runs against the PER-PR Vercel PREVIEW deployment of the reviewer web
# app. tik-test is a pre-production tool, so production is intentionally
# never targeted — all TIKTEST_BYPASS_* env vars on Vercel live in the
# Preview environment only. The bypass route 404s on Production by
# design (its required env vars are absent there).
#
# Trigger model
# -------------
# Triggered on `pull_request` (so `anthropics/claude-code-action`'s auth
# step accepts the event — it explicitly refuses `deployment_status`).
# Inside the workflow we then POLL the GitHub Deployments API for a
# successful Preview deployment matching the PR's head SHA. That gives
# us per-PR preview URLs without needing the deployment_status trigger.
#
# Sister workflow: tik-test-taskpad.yml runs on PRs that touch the
# bundled Taskpad demo and spins up the demo locally inside the runner.
#
# Required GitHub Actions secrets:
#   - CLAUDE_CODE_OAUTH_TOKEN          — same as the taskpad workflow
#   - OPENAI_API_KEY                   — optional, enables TTS narration
#   - TIKTEST_BYPASS_SECRET            — same value set as TIKTEST_BYPASS_SECRET on
#                                         the Vercel project's PREVIEW env. Used
#                                         here to sign the bypass URL.
#   - VERCEL_AUTOMATION_BYPASS_SECRET  — required because Vercel Deployment
#                                         Protection is on for previews. Get it
#                                         from Vercel project Settings →
#                                         Deployment Protection → Protection
#                                         Bypass for Automation. Without it the
#                                         agent's browser hits the Vercel auth
#                                         wall before reaching `/api/test-bootstrap`.
#
# The bypass URL is signed RIGHT BEFORE the action runs so the ±60s skew
# window has the full plan-gen + agent-launch budget. If runs hit the
# skew limit, bump TIKTEST_BYPASS_MAX_SKEW_S on the Vercel side rather
# than racing here.
#
name: tik-test review (webapp)

on:
  pull_request:
    paths:
      - web/**
      - .github/workflows/tik-test-webapp.yml
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
      preview_url:
        description: 'Preview URL to test against (e.g. https://tik-test-review-git-foo.vercel.app)'
        required: true

permissions:
  contents: write
  pull-requests: write
  id-token: write
  deployments: read

jobs:
  review:
    # Owners gate keeps fork PRs and random contributors from burning the
    # Claude subscription budget. Same shape as the taskpad workflow.
    if: |
      contains(fromJSON(vars.TIKTEST_OWNERS || '["marcushyett"]'), github.actor) &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel Preview deployment
        id: vercel
        # Skip on workflow_dispatch — the user provided the URL directly.
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Poll the deployments API until a Preview deployment with state=success
          # exists for this PR's head SHA. Vercel typically takes 60-180s for the
          # web/ project, occasionally longer on cold deps. Cap at 12 min so we
          # never strand the runner indefinitely.
          set -euo pipefail
          DEADLINE=$(( $(date +%s) + 720 ))
          while [[ $(date +%s) -lt $DEADLINE ]]; do
            DEP_ID=$(gh api "repos/$REPO/deployments?sha=$SHA&environment=Preview&per_page=5" --jq '.[0].id // empty')
            if [[ -n "$DEP_ID" ]]; then
              URL=$(gh api "repos/$REPO/deployments/$DEP_ID/statuses" --jq '.[] | select(.state == "success") | .target_url' | head -1)
              if [[ -n "$URL" ]]; then
                echo "Found preview: $URL"
                echo "url=$URL" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              # Surface a still-building hint without polluting logs every poll.
              STATE=$(gh api "repos/$REPO/deployments/$DEP_ID/statuses" --jq '.[0].state // "?"')
              echo "Vercel preview not ready yet (latest state: $STATE) — sleeping…"
            else
              echo "No Preview deployment for SHA $SHA yet — sleeping…"
            fi
            sleep 30
          done
          echo "::error::Timed out after 12 min waiting for a successful Vercel Preview deployment for $SHA."
          exit 1

      - name: Sign test-bypass URL
        id: sign
        shell: bash
        env:
          TIKTEST_BYPASS_SECRET: ${{ secrets.TIKTEST_BYPASS_SECRET }}
          # Either the polled URL from the Vercel deployments API, or the
          # URL the maintainer typed when manually dispatching.
          BASE_URL: ${{ steps.vercel.outputs.url || github.event.inputs.preview_url }}
        run: |
          if [[ -z "$TIKTEST_BYPASS_SECRET" ]]; then
            echo "::error::TIKTEST_BYPASS_SECRET is not set. Add it under Settings → Secrets and Variables → Actions (same value as in Vercel Preview env)."
            exit 1
          fi
          if [[ -z "$BASE_URL" ]]; then
            echo "::error::Couldn't resolve a preview URL (no Vercel preview found, no preview_url input)."
            exit 1
          fi
          REDIRECT="/r/${{ github.repository }}"
          URL=$(node web/scripts/sign-bypass-url.mjs --base "$BASE_URL" --redirect "$REDIRECT")
          # Mask in logs even though logs are private — defence in depth.
          echo "::add-mask::$URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Signed bypass URL against: $BASE_URL"

      - uses: ./
        with:
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          pr-number: ${{ github.event.inputs.pr_number }}
          working-directory: web
          preview-url: ${{ steps.sign.outputs.url }}
          vercel-bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
