<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Taskpad — stay focused</title>
<style>
  :root {
    --bg: #f3f4f7;
    --card: #ffffff;
    --ink: #0e1116;
    --ink-2: #4b5260;
    --line: #e4e6ec;
    --accent: #6c5cff;
    --accent-2: #0bd8a6;
    --danger: #ef4b4b;
    --shadow: 0 12px 32px rgba(20, 22, 30, 0.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
  .app { max-width: 640px; margin: 48px auto; padding: 0 20px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  header h1 { font-size: 28px; margin: 0; letter-spacing: -0.02em; }
  header h1 span { color: var(--accent); }
  header small { color: var(--ink-2); }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
  .new-task { display: flex; gap: 10px; padding: 16px; border-bottom: 1px solid var(--line); }
  .new-task input[type=text] { flex: 1; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; font-size: 16px; outline: none; transition: border-color 120ms; }
  .new-task input[type=text]:focus { border-color: var(--accent); }
  .new-task select { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: #fff; }
  .new-task button { background: var(--accent); color: #fff; border: 0; border-radius: 10px; padding: 0 18px; font-weight: 700; cursor: pointer; transition: transform 80ms, background 120ms; }
  .new-task button:hover { transform: translateY(-1px); background: #5a4bf0; }
  .filters { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--line); background: #fafbfd; }
  .filters button { background: transparent; border: 1px solid var(--line); color: var(--ink-2); border-radius: 999px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
  .filters button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  ul.tasks { list-style: none; margin: 0; padding: 0; }
  ul.tasks li { display: grid; grid-template-columns: 28px 1fr auto auto; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--line); transition: background 120ms; }
  ul.tasks li:last-child { border-bottom: 0; }
  ul.tasks li:hover { background: #fafbfd; }
  ul.tasks li.done .title { text-decoration: line-through; color: var(--ink-2); }
  ul.tasks li.done { opacity: 0.7; }
  ul.tasks input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--accent-2); cursor: pointer; }
  .title { font-size: 15px; }
  .badge { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 999px; background: #f0f2fa; color: var(--ink-2); }
  .badge.high { background: #ffedea; color: #c83c1e; }
  .badge.low { background: #eafaf3; color: #0a8560; }
  .del { background: transparent; border: 0; color: var(--ink-2); cursor: pointer; padding: 6px 8px; border-radius: 8px; }
  .del:hover { background: #ffecec; color: var(--danger); }
  .empty { padding: 40px 20px; text-align: center; color: var(--ink-2); font-size: 14px; }
  footer.foot { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; font-size: 12px; color: var(--ink-2); background: #fafbfd; border-top: 1px solid var(--line); }
  footer.foot button { background: transparent; border: 0; color: var(--ink-2); font-size: 12px; cursor: pointer; }
  footer.foot button:hover { color: var(--danger); text-decoration: underline; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 10px 16px; border-radius: 999px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 160ms, transform 160ms; }
  .toast.show { opacity: 1; transform: translate(-50%, -8px); }

  /* --- Login gate --- */
  .login-gate { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(145deg, #eef1fb 0%, #fafbfd 100%); z-index: 100; }
  .login-card { background: #fff; border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); padding: 28px 28px 22px; width: 320px; }
  .login-card h2 { margin: 0 0 4px; font-size: 22px; }
  .login-card .sub { color: var(--ink-2); font-size: 13px; margin-bottom: 18px; }
  .login-card label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-2); display: block; margin: 12px 0 4px; }
  .login-card input { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none; transition: border-color 120ms; }
  .login-card input:focus { border-color: var(--accent); }
  .login-card button { margin-top: 18px; width: 100%; background: var(--accent); color: #fff; border: 0; border-radius: 10px; padding: 12px; font-weight: 700; cursor: pointer; transition: transform 80ms, background 120ms; }
  .login-card button:hover { transform: translateY(-1px); background: #5a4bf0; }
  .login-hint { margin-top: 12px; font-size: 11px; color: var(--ink-2); text-align: center; }

  /* --- Loading overlay + spinners --- */
  .loading-overlay { position: fixed; inset: 0; background: rgba(10, 12, 18, 0.55); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(6px); }
  .loading-card { background: #fff; border-radius: 14px; padding: 18px 22px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--ink); }
  .spinner { width: 18px; height: 18px; border: 2.5px solid #e8eaf2; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  /* Inline spinner inside the Add button */
  .btn-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.55s linear infinite; vertical-align: -2px; margin-right: 4px; }
  .new-task button.loading { pointer-events: none; opacity: 0.85; }

  /* --- AI priority hints --- */
  .smart-toggle { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); border-radius: 999px; background: transparent; color: var(--ink-2); font-size: 12px; padding: 6px 10px; cursor: pointer; transition: background 120ms, color 120ms, border-color 120ms; }
  .smart-toggle.active { background: rgba(108, 92, 255, 0.12); color: var(--accent); border-color: rgba(108, 92, 255, 0.3); }
  .smart-toggle:hover { color: var(--accent); }
  .smart-toggle svg { width: 13px; height: 13px; }
  .suggest-bar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; min-height: 44px; border-bottom: 1px solid var(--line); background: rgba(108, 92, 255, 0.04); font-size: 13px; color: var(--ink-2); }
  .suggest-bar[hidden] { display: none; }
  .suggest-loading { display: inline-flex; align-items: center; gap: 8px; }
  .suggest-loading[hidden] { display: none; }
  .dot-spinner { width: 12px; height: 12px; border: 2px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  .suggest-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: #fff; border: 0; border-radius: 999px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: transform 80ms, background 120ms; text-transform: capitalize; }
  .suggest-pill[hidden] { display: none; }
  .suggest-pill:hover { transform: translateY(-1px); background: #5a4bf0; }
  .suggest-pill .priority-label { text-transform: capitalize; }
  .suggest-meta { font-size: 11px; color: var(--ink-2); }
</style>
</head>
<body>
<!-- Login gate — shown on first load until the user signs in. -->
<div class="login-gate" id="login-gate" data-testid="login-gate">
  <form class="login-card" id="login-form" data-testid="login-form">
    <h2>Sign in to Task<span style="color: var(--accent)">pad</span></h2>
    <div class="sub">Any email + password works — this is a demo.</div>
    <label for="login-email">Email</label>
    <input id="login-email" data-testid="login-email" type="email" autocomplete="username" value="marcus@taskpad.app" />
    <label for="login-password">Password</label>
    <input id="login-password" data-testid="login-password" type="password" autocomplete="current-password" placeholder="anything goes" />
    <button type="submit" data-testid="login-submit">Sign in</button>
    <div class="login-hint">This screen exists so the tik-test cropping logic has something dull to skip past.</div>
  </form>
</div>

<!-- Loading overlay used by fake async work. -->
<div class="loading-overlay" id="loading-overlay" data-testid="loading-overlay" style="display:none">
  <div class="loading-card"><div class="spinner"></div><span id="loading-label">Signing you in…</span></div>
</div>

<div class="app" id="main-app" style="display:none" data-testid="main-app">
  <header>
    <h1>Task<span>pad</span></h1>
    <small id="counter" data-testid="counter">0 tasks</small>
  </header>

  <div class="card">
    <form class="new-task" id="new-task-form">
      <input id="new-task-input" data-testid="new-task-input" type="text" placeholder="What needs doing?" autocomplete="off" required />
      <select id="new-task-priority" data-testid="new-task-priority">
        <option value="low">Low</option>
        <option value="normal" selected>Normal</option>
        <option value="high">High</option>
      </select>
      <button type="button" class="smart-toggle active" id="smart-toggle" data-testid="smart-toggle" aria-pressed="true" aria-label="Toggle AI priority suggestions" title="When on, the priority is suggested based on what you type">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        Smart
      </button>
      <button type="submit" data-testid="add-task">Add</button>
    </form>

    <!-- AI suggestion bar — populated by /api/suggest-priority. The whole
         row is hidden until the user has typed something the API can score. -->
    <div class="suggest-bar" id="suggest-bar" data-testid="suggest-bar" hidden>
      <span class="suggest-loading" id="suggest-loading" data-testid="suggest-loading" hidden>
        <span class="dot-spinner"></span> Thinking…
      </span>
      <button type="button" class="suggest-pill" id="suggest-pill" data-testid="suggest-pill" hidden>
        AI suggests:&nbsp;<span id="suggest-priority" data-testid="suggest-priority"></span>
      </button>
      <span class="suggest-meta" id="suggest-meta" data-testid="suggest-meta"></span>
    </div>

    <div class="filters" data-testid="filters">
      <button data-filter="all" class="active">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="done">Done</button>
      <button data-filter="high">High priority</button>
    </div>

    <ul class="tasks" id="tasks" data-testid="tasks"></ul>
    <div class="empty" id="empty" data-testid="empty">Nothing here yet — add your first task above.</div>

    <footer class="foot">
      <span id="stats" data-testid="stats">—</span>
      <button id="clear-done" data-testid="clear-done">Clear completed</button>
    </footer>
  </div>
</div>

<div class="toast" id="toast" data-testid="toast"></div>

<script>
  const state = { tasks: [], filter: "all" };
  const $ = (s) => document.querySelector(s);
  const tasksEl = $("#tasks");
  const emptyEl = $("#empty");
  const statsEl = $("#stats");
  const counterEl = $("#counter");
  const toast = (msg) => {
    const t = $("#toast"); t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1400);
  };

  function render() {
    let items = state.tasks;
    if (state.filter === "active") items = items.filter((t) => !t.done);
    else if (state.filter === "done") items = items.filter((t) => t.done);
    // BUG #2 (for tik-test demo): "High priority" filter accidentally shows LOW
    // priority tasks — a single-character string swap during a refactor. The
    // classic "two things on the same page, wrong one wired up" regression.
    else if (state.filter === "high") items = items.filter((t) => t.priority === "low");

    tasksEl.innerHTML = items.map((t) => `
      <li class="${t.done ? "done" : ""}" data-id="${t.id}" data-testid="task-${t.id}">
        <input type="checkbox" data-testid="toggle-${t.id}" ${t.done ? "checked" : ""} />
        <div class="title">${escape(t.title)}</div>
        <span class="badge ${t.priority}">${t.priority}</span>
        <button class="del" data-testid="del-${t.id}" aria-label="Delete task">✕</button>
      </li>
    `).join("");

    emptyEl.style.display = items.length ? "none" : "block";
    const total = state.tasks.length;
    const done = state.tasks.filter((t) => t.done).length;
    counterEl.textContent = `${total} ${total === 1 ? "task" : "tasks"}`;
    statsEl.textContent = total ? `${done}/${total} done · ${state.tasks.filter((t) => t.priority === "high" && !t.done).length} high-priority pending` : "No tasks";

    tasksEl.querySelectorAll("input[type=checkbox]").forEach((cb) => {
      cb.addEventListener("change", () => {
        const id = cb.closest("li").dataset.id;
        const t = state.tasks.find((x) => x.id === id);
        t.done = cb.checked;
        if (t.done) toast("Nice — marked done.");
        render();
      });
    });
    tasksEl.querySelectorAll(".del").forEach((b) => {
      b.addEventListener("click", () => {
        const id = b.closest("li").dataset.id;
        state.tasks = state.tasks.filter((x) => x.id !== id);
        toast("Task removed.");
        render();
      });
    });
  }

  function escape(s) { return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

  // --- Login flow with a ~1.2s "signing you in…" spinner ---
  function showLoading(label) {
    const o = document.getElementById("loading-overlay");
    document.getElementById("loading-label").textContent = label;
    o.style.display = "flex";
  }
  function hideLoading() {
    document.getElementById("loading-overlay").style.display = "none";
  }
  document.getElementById("login-form").addEventListener("submit", (e) => {
    e.preventDefault();
    showLoading("Signing you in…");
    setTimeout(() => {
      hideLoading();
      document.getElementById("login-gate").style.display = "none";
      document.getElementById("main-app").style.display = "block";
      toast("Welcome back, Marcus.");
    }, 1200);
  });

  $("#new-task-form").addEventListener("submit", (e) => {
    e.preventDefault();
    const title = $("#new-task-input").value.trim();
    if (!title) return;
    const priority = $("#new-task-priority").value;
    // Fake a save round-trip with a button spinner so the cropping has something to collapse.
    const btn = e.target.querySelector("button[type=submit]");
    const originalHtml = btn.innerHTML;
    btn.classList.add("loading");
    btn.innerHTML = '<span class="btn-spinner"></span>Saving';
    setTimeout(() => {
      btn.classList.remove("loading");
      btn.innerHTML = originalHtml;
      state.tasks.push({ id: "t" + (state.tasks.length + 1) + "-" + Math.random().toString(36).slice(2, 6), title, priority, done: false });
      $("#new-task-input").value = "";
      toast("Task added.");
      render();
    }, 850);
  });

  document.querySelectorAll(".filters button").forEach((b) => {
    b.addEventListener("click", () => {
      document.querySelectorAll(".filters button").forEach((x) => x.classList.remove("active"));
      b.classList.add("active");
      state.filter = b.dataset.filter;
      render();
    });
  });

  // ---- AI priority hints --------------------------------------------------
  // The user types a task title; we debounce and POST the text to a tiny
  // backend (/api/suggest-priority — see server.js) which scores keywords
  // and returns {priority, confidence, matched}. The pill is one click to
  // accept; the toggle disables the whole subsystem so no requests fire.
  const smartToggle = $("#smart-toggle");
  const suggestBar = $("#suggest-bar");
  const suggestLoading = $("#suggest-loading");
  const suggestPill = $("#suggest-pill");
  const suggestPriorityEl = $("#suggest-priority");
  const suggestMeta = $("#suggest-meta");
  const newTaskInput = $("#new-task-input");
  const newTaskPriority = $("#new-task-priority");

  let smartEnabled = true;
  let suggestTimer = null;
  let inFlight = null;          // current AbortController, so a new keystroke cancels in-flight
  let lastSuggestion = null;    // {priority, confidence, matched, text} — read by the apply handler

  function hideSuggestBar() {
    suggestBar.hidden = true;
    suggestLoading.hidden = true;
    suggestPill.hidden = true;
    suggestMeta.textContent = "";
  }

  async function fetchSuggestion(text) {
    if (inFlight) inFlight.abort();
    inFlight = new AbortController();
    suggestBar.hidden = false;
    suggestLoading.hidden = false;
    suggestPill.hidden = true;
    try {
      const r = await fetch("/api/suggest-priority", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
        signal: inFlight.signal,
      });
      if (!r.ok) throw new Error(`suggest-priority ${r.status}`);
      const data = await r.json();
      inFlight = null;
      lastSuggestion = { ...data, text };
      suggestLoading.hidden = true;
      suggestPriorityEl.textContent = data.priority;
      suggestPill.hidden = false;
      suggestMeta.textContent = data.matched && data.matched.length
        ? `matched: ${data.matched.join(", ")}`
        : `no keyword match — default`;
      suggestPill.title = `confidence ${Math.round((data.confidence ?? 0) * 100)}%`;
    } catch (e) {
      // AbortError = a newer keystroke superseded us; stay quiet.
      if (e.name === "AbortError") return;
      suggestLoading.hidden = true;
      suggestPill.hidden = true;
      suggestMeta.textContent = "couldn't reach the suggestion service";
    }
  }

  newTaskInput.addEventListener("input", () => {
    const text = newTaskInput.value.trim();
    if (!smartEnabled || text.length < 3) { hideSuggestBar(); return; }
    if (suggestTimer) clearTimeout(suggestTimer);
    // 350 ms is the sweet spot — below ~250 the API thrashes on every
    // keystroke; above ~500 the pill arrives after the user has already
    // reached for the dropdown.
    suggestTimer = setTimeout(() => fetchSuggestion(text), 350);
  });

  smartToggle.addEventListener("click", () => {
    smartEnabled = !smartEnabled;
    smartToggle.classList.toggle("active", smartEnabled);
    smartToggle.setAttribute("aria-pressed", String(smartEnabled));
    if (!smartEnabled) {
      if (suggestTimer) clearTimeout(suggestTimer);
      if (inFlight) inFlight.abort();
      hideSuggestBar();
      toast("Smart priority off.");
    } else {
      toast("Smart priority on.");
      // Re-evaluate the current input so the pill re-appears immediately.
      newTaskInput.dispatchEvent(new Event("input"));
    }
  });

  suggestPill.addEventListener("click", () => {
    if (!lastSuggestion) return;
    newTaskPriority.value = lastSuggestion.priority;
    suggestPill.hidden = true;
    suggestMeta.textContent = `applied: ${lastSuggestion.priority}`;
    toast(`Priority set to ${lastSuggestion.priority}.`);
  });

  // After the form submits and the input clears, hide the suggestion bar.
  // The existing submit handler clears #new-task-input via .value="" which
  // does NOT fire 'input', so we do the cleanup ourselves on a delay that
  // lines up with the fake save round-trip in the submit handler.
  $("#new-task-form").addEventListener("submit", () => {
    setTimeout(() => {
      if (suggestTimer) clearTimeout(suggestTimer);
      if (inFlight) inFlight.abort();
      lastSuggestion = null;
      hideSuggestBar();
    }, 900);
  });

  $("#clear-done").addEventListener("click", () => {
    const before = state.tasks.length;
    // BUG (for tik-test demo): "Clear completed" also nukes HIGH priority rows
    // regardless of status — user reported it wipes critical pending work.
    state.tasks = state.tasks.filter((t) => !t.done && t.priority !== "high");
    if (before !== state.tasks.length) toast("Cleared completed.");
    render();
  });

  // Seed with some demo data so first run isn't empty
  state.tasks = [
    { id: "seed-1", title: "Review draft spec", priority: "normal", done: true },
    { id: "seed-2", title: "Ship Taskpad v0.1", priority: "high", done: false },
  ];
  render();
</script>
</body>
</html>
